<!-- pages/tu-vi.html — Trang Lập Lá Số Tử Vi -->
<link rel="stylesheet" href="css/tu-vi.css">

<div class="app-container">

  <!-- ===== TIÊU ĐỀ ===== -->
  <h1 class="section-title">⭐ Lập Lá Số Tử Vi</h1>
  <p class="section-subtitle">Nhập thông tin sinh nhật để lập lá số và luận giải vận mệnh</p>

  <!-- ===== FORM NHẬP THÔNG TIN ===== -->
  <div class="form-section mb-lg">
    <div class="tv-form-grid">

      <!-- Họ tên -->
      <div class="tv-form-group span-2">
        <label class="tv-form-label" for="tv-ho-ten">Họ và tên</label>
        <input type="text" id="tv-ho-ten" class="tv-form-input" placeholder="VD: Nguyễn Văn An">
      </div>

      <!-- Giới tính -->
      <div class="tv-form-group">
        <label class="tv-form-label" for="tv-gioi-tinh">Giới tính</label>
        <select id="tv-gioi-tinh" class="tv-form-select">
          <option value="nam">Nam</option>
          <option value="nu">Nữ</option>
        </select>
      </div>

      <!-- Ngày sinh -->
      <div class="tv-form-group">
        <label class="tv-form-label" for="tv-ngay">Ngày sinh</label>
        <input type="number" id="tv-ngay" class="tv-form-input" min="1" max="31" placeholder="1-31">
      </div>

      <!-- Tháng sinh -->
      <div class="tv-form-group">
        <label class="tv-form-label" for="tv-thang">Tháng sinh</label>
        <input type="number" id="tv-thang" class="tv-form-input" min="1" max="12" placeholder="1-12">
      </div>

      <!-- Năm sinh -->
      <div class="tv-form-group">
        <label class="tv-form-label" for="tv-nam">Năm sinh</label>
        <input type="number" id="tv-nam" class="tv-form-input" min="1900" max="2100" placeholder="VD: 1990">
      </div>

      <!-- Giờ sinh -->
      <div class="tv-form-group">
        <label class="tv-form-label" for="tv-gio">Giờ sinh (Địa Chi)</label>
        <select id="tv-gio" class="tv-form-select">
          <option value="">-- Không rõ --</option>
          <option value="Tý">Tý (23:00 – 01:00)</option>
          <option value="Sửu">Sửu (01:00 – 03:00)</option>
          <option value="Dần">Dần (03:00 – 05:00)</option>
          <option value="Mão">Mão (05:00 – 07:00)</option>
          <option value="Thìn">Thìn (07:00 – 09:00)</option>
          <option value="Tỵ">Tỵ (09:00 – 11:00)</option>
          <option value="Ngọ">Ngọ (11:00 – 13:00)</option>
          <option value="Mùi">Mùi (13:00 – 15:00)</option>
          <option value="Thân">Thân (15:00 – 17:00)</option>
          <option value="Dậu">Dậu (17:00 – 19:00)</option>
          <option value="Tuất">Tuất (19:00 – 21:00)</option>
          <option value="Hợi">Hợi (21:00 – 23:00)</option>
        </select>
      </div>

      <!-- Múi giờ -->
      <div class="tv-form-group">
        <label class="tv-form-label" for="tv-mui-gio">Múi giờ</label>
        <select id="tv-mui-gio" class="tv-form-select">
          <option value="7" selected>UTC+7 (Việt Nam)</option>
          <option value="8">UTC+8</option>
          <option value="0">UTC+0</option>
        </select>
      </div>

    </div><!-- /.tv-form-grid -->

    <div class="tv-submit-wrap">
      <button class="btn btn-primary" id="tv-btn-lap" onclick="tvLapLaSo()">
        ⭐ Lập Lá Số Tử Vi
      </button>
    </div>
  </div><!-- /.form-section -->

  <!-- ===== KẾT QUẢ (ẩn ban đầu) ===== -->
  <div id="tv-result" class="hidden">

    <!-- Tứ Trụ -->
    <h3 class="section-title" style="font-size:1.2rem;margin-bottom:var(--sp-md);">Tứ Trụ Sinh</h3>
    <div class="tv-tu-tru" id="tv-tu-tru"><!-- Render bởi JS --></div>

    <!-- Mệnh - Cục - Chủ Mệnh - Thân -->
    <div class="tv-menh-grid" id="tv-menh-grid"><!-- Render bởi JS --></div>

    <!-- Lá số 12 cung -->
    <div class="tv-la-so-wrap">
      <div class="tv-la-so-title">🌟 Lá Số Tử Vi — 12 Cung</div>
      <div class="tv-la-so-grid" id="tv-la-so-grid"><!-- Render bởi JS --></div>
    </div>

    <!-- Tabs: Đại Vận / AI Luận Giải -->
    <div class="tv-tabs-wrap">
      <div class="tabs">
        <button class="tab-btn active" data-tab="tv-tab-dai-van">📅 Đại Vận &amp; Tiểu Vận</button>
        <button class="tab-btn" data-tab="tv-tab-ai">🤖 AI Luận Giải</button>
      </div>

      <!-- Tab Đại Vận -->
      <div class="tab-content active" id="tv-tab-dai-van">
        <div class="tv-dai-van-grid" id="tv-dai-van-grid"><!-- Render bởi JS --></div>
        <div class="tv-tieu-van-title">Tiểu Vận trong đại vận hiện tại</div>
        <div class="tv-tieu-van-grid" id="tv-tieu-van-grid"><!-- Render bởi JS --></div>
      </div>

      <!-- Tab AI Luận Giải -->
      <div class="tab-content" id="tv-tab-ai">
        <div class="tv-ai-wrap">
          <div class="tv-ai-btn-wrap">
            <button class="btn btn-primary" id="tv-btn-ai" onclick="tvLuanGiai()">
              ✨ Luận Giải Lá Số bằng AI
            </button>
          </div>
          <div id="tv-ai-result-box"></div>
        </div>
      </div>

    </div><!-- /.tv-tabs-wrap -->

  </div><!-- /#tv-result -->

</div><!-- /.app-container -->

<!-- ===== POPUP CHI TIẾT CUNG ===== -->
<div class="popup-overlay hidden" id="tv-popup-overlay">
  <div class="popup tv-cung-popup" id="tv-popup">
    <div class="popup-header">
      <h3 class="popup-title" id="tv-popup-title">Chi tiết cung</h3>
      <button class="popup-close" id="tv-popup-close">✕</button>
    </div>
    <div id="tv-popup-body"><!-- Render bởi JS --></div>
  </div>
</div>
